<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Slova</title>
    <style>
        body {
            background-color: black;
            color: #00FF00;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            text-shadow: 0 0 10px #00FF00;
        }
        .secret-word {
            font-size: 2em;
            color: #FF00FF;
            text-shadow: 0 0 10px #FF00FF;
        }
        button {
            background-color: #00FF00;
            border: none;
            color: black;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 12px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #FFFF00;
        }
    </style>
</head>
<body>
    <h1>Welcome to Infinity Slova!</h1>
    <p class="secret-word">🔑 Secret Word: [Your Secret Word]</p>
    <button onclick="playSound()">Play Sound</button>
    <script>
        function playSound() {
            var audio = new Audio('sound.mp3');
            audio.play();
        }
    </script>
</body>
</html>
